name: Actualizar Mundial 2026

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  update-live-json:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Actualizar JSON del Mundial 2026
        run: node scripts/updateLiveWorldCup2026.mjs

      - name: Confirmar cambios si existen
        run: |
          if git diff --quiet -- live_worldcup_2026.json; then
            echo "Sin cambios en live_worldcup_2026.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live_worldcup_2026.json
          git commit -m "Actualizar datos del Mundial 2026"
          git push
